<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Servidor Ensembl</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #dc3545;
            font-size: 48px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        h2 {
            color: #495057;
            font-size: 20px;
            margin-bottom: 20px;
        }
        p {
            color: #6c757d;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>¡Ups!</h1>
        <h2>Ha ocurrido un error en la solicitud</h2>
        <p>
            No se han podido obtener los datos de la API de Ensembl.
            Por favor, asegúrate de que el servidor está encendido, que los parámetros introducidos son correctos o inténtalo de nuevo más tarde.
        </p>
        <a href="/" class="btn">Volver al Inicio</a>
    </div>

</body>
</html>
