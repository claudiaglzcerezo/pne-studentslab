<!DOCTYPE html>
<html>
<head>
<title> SEQ2 server </title>
</head>
<body>
  <h1>Access to the Server</h1>
    <form action="ping" method="get">
      <p>Is the server alive?<input type="submit" value="PING"></p>
    </form>
  <hr>

    <form action="/get" method="get">
      <p>Get a sequence. Select sequence
        <label for="seq_id">Sequence Index:</label>
        <input type="number" name="id" id="seq_id" min="0" max="4" value="0">
        <button type="submit">Get Sequence</button>
        <input type="submit" value="GET"></p>
    </form>


</body>
</html>
